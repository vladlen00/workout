<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Тренировки — irena.bio</title>
<script src="telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #1a1228;
  font-family: 'Raleway', sans-serif;
  color: #e0d8f0;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 70% 50% at 30% 20%, rgba(140,60,200,0.3) 0%, transparent 70%),
              radial-gradient(ellipse 50% 40% at 80% 70%, rgba(100,40,160,0.2) 0%, transparent 60%);
  pointer-events: none;
}
.app {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.header { padding: 20px 24px 0; flex-shrink: 0; }
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: 1.6rem; letter-spacing: 0.1em;
  color: rgba(220,200,255,0.9);
  text-shadow: 0 0 30px rgba(160,80,220,0.4);
}
.header-sub {
  font-size: 0.7rem; letter-spacing: 0.25em;
  color: rgba(160,140,210,0.5);
  margin-top: 2px; text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
.ig-icon { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.5; }

/* Tabs */
.tabs {
  display: flex; gap: 6px;
  padding: 16px 24px 0;
  flex-shrink: 0;
}
.tab-btn {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 8px 16px;
  font-family: 'Raleway', sans-serif;
  font-size: 0.75rem; font-weight: 300;
  letter-spacing: 0.12em;
  color: rgba(180,160,230,0.6);
  cursor: pointer; white-space: nowrap;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.active {
  background: rgba(120,60,220,0.3);
  border-color: rgba(140,80,220,0.5);
  color: rgba(220,200,255,1);
}

/* Loading */
.loading {
  display: flex; align-items: center; justify-content: center;
  flex: 1; padding: 40px;
}
.loading-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(160,120,255,0.6);
  animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

/* Player screen */
.player-screen { display: none; flex-direction: column; flex: 1; }
.player-screen.active { display: flex; }
.player-back {
  display: flex; align-items: center; gap: 8px;
  padding: 16px 24px 8px; cursor: pointer;
  color: rgba(160,140,210,0.6);
  font-size: 0.75rem; letter-spacing: 0.1em;
}
.player-back:active { color: rgba(200,180,255,0.9); }
.player-wrap { position: relative; width: 100%; padding-top: 178%; background: #000; flex-shrink: 0; }
.player-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.player-info { padding: 16px 24px 24px; }
.player-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400; font-size: 1.3rem;
  color: rgba(220,200,255,0.9); margin-bottom: 4px;
}

/* List screen */
.list-screen { display: none; flex-direction: column; flex: 1; padding: 16px 24px 40px; }
.list-screen.active { display: flex; }
.panel { display: none; }
.panel.active { display: block; }

.section-label {
  font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(150,130,200,0.45); margin-bottom: 14px; margin-top: 8px;
}

.workout-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 16px; margin-bottom: 10px;
  cursor: pointer; transition: all 0.25s;
}
.workout-item:active { background: rgba(120,60,220,0.3); border-color: rgba(160,100,255,0.5); }
.workout-item.locked { opacity: 0.5; cursor: default; pointer-events: none; }

.workout-num {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(140,80,240,0.4);
  border: 1px solid rgba(160,100,255,0.5);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem; font-weight: 300;
  color: #fff; flex-shrink: 0;
}
.workout-item.locked .workout-num {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.12);
  color: rgba(200,180,240,0.6);
}
.workout-info { flex: 1; min-width: 0; }
.workout-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400; font-size: 1.05rem; color: #fff;
}
.unlock-soon {
  font-size: 0.6rem; letter-spacing: 0.06em;
  color: rgba(200,180,240,0.6); margin-top: 3px;
}
.workout-play {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(140,80,240,0.4);
  border: 1px solid rgba(160,100,255,0.5);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 0.75rem;
  color: #fff; padding-left: 2px;
}
.workout-item.locked .workout-play {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.1);
  font-size: 0.85rem; padding-left: 0;
  color: rgba(200,180,240,0.5);
}

.author {
  position: fixed; bottom: 8px; left: 0; right: 0;
  text-align: center; z-index: 10;
  font-size: 0.65rem; letter-spacing: 0.2em;
  color: rgba(120,100,180,0.35); pointer-events: none;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="app">
  <div class="header">
    <div class="header-title">Тренировки «Женское тело»</div>
    <div class="header-sub">
      <svg class="ig-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
      irena.bio
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('workouts')">Тренировки</button>
    <button class="tab-btn" onclick="switchTab('techniques')">Техники</button>
  </div>

  <div class="loading" id="loadingScreen"><div class="loading-dot"></div></div>

  <div class="list-screen" id="listScreen">
    <div class="panel active" id="panel-workouts">
      <div class="section-label">Программа · Женское тело</div>
      <div id="workoutList"></div>
    </div>
    <div class="panel" id="panel-techniques">
      <div class="section-label">Вакуум и наули</div>
      <div id="techniqueList"></div>
    </div>
  </div>

  <div class="player-screen" id="playerScreen">
    <div class="player-back" onclick="closeVideo()">← Назад</div>
    <div class="player-wrap">
      <iframe id="videoFrame" src="" allow="autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer; clipboard-write; screen-wake-lock;" allowfullscreen></iframe>
    </div>
    <div class="player-info">
      <div class="player-title" id="playerTitle"></div>
    </div>
  </div>
</div>

<div class="author">irena.bio</div>

<script>
// ====== Telegram Mini App access control ======
const IRENA_VERIFY_URL = "https://kjzxrpwqyyjcykwbqskn.supabase.co/functions/v1/verify-access";
const IRENA_TOKEN_KEY = "irena_access_token";
const IRENA_TOKEN_EXPIRES_KEY = "irena_access_token_expires_at";
const IRENA_SUBSCRIBE_URL = "https://t.me/Biochakirena_bot";

function irenaGetStoredToken() {
  try {
    const token = localStorage.getItem(IRENA_TOKEN_KEY);
    const expiresAt = parseInt(localStorage.getItem(IRENA_TOKEN_EXPIRES_KEY) || "0", 10);
    if (!token || !expiresAt) return null;
    if (Date.now() >= expiresAt - 60000) return null;
    return token;
  } catch { return null; }
}

function irenaStoreToken(token, ttl) {
  try {
    localStorage.setItem(IRENA_TOKEN_KEY, token);
    localStorage.setItem(IRENA_TOKEN_EXPIRES_KEY, String(Date.now() + ttl * 1000));
  } catch {}
}

function irenaGetInitData() {
  try {
    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
      return window.Telegram.WebApp.initData;
    }
  } catch {}
  return null;
}

function irenaShowBlocked(reason) {
  document.body.innerHTML = '';
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;z-index:999999;background:#1a1228;color:#e0d8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;text-align:center;";
  overlay.innerHTML = `
    <div style="font-size:64px;margin-bottom:24px;">🔒</div>
    <div style="font-size:22px;font-weight:700;margin-bottom:12px;">Доступ закрыт</div>
    <div style="font-size:15px;line-height:1.6;color:rgba(255,255,255,0.7);margin-bottom:32px;max-width:340px;">Тренировки доступны только участницам клуба Ирены Пол. Для получения доступа перейди в бот и оформи подписку.</div>
    <a href="${IRENA_SUBSCRIBE_URL}" target="_blank" rel="noopener" style="display:inline-block;padding:14px 32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:14px;font-size:15px;font-weight:600;text-decoration:none;">Оформить подписку</a>
    ${reason ? `<div style="position:absolute;bottom:12px;left:0;right:0;font-size:10px;color:rgba(255,255,255,0.15);text-align:center;">${reason}</div>` : ''}
  `;
  document.body.appendChild(overlay);
}

async function irenaCheckAccess() {
  const cached = irenaGetStoredToken();
  if (cached) return true;
  const initData = irenaGetInitData();
  if (!initData) { irenaShowBlocked("no_telegram_context"); return false; }
  try {
    const res = await fetch(IRENA_VERIFY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ initData }),
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok && data.ok && data.token) {
      irenaStoreToken(data.token, data.expiresIn || 86400);
      return true;
    }
    const reason = res.status === 403 ? "not_a_member" : res.status === 401 ? "invalid_init_data" : `error_${res.status}`;
    irenaShowBlocked(reason);
    return false;
  } catch {
    irenaShowBlocked("network_error");
    return false;
  }
}
// ====== End access control ======

const SUPABASE_URL = "https://kjzxrpwqyyjcykwbqskn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqenhycHdxeXlqY3lrd2Jxc2tuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDg1NjUsImV4cCI6MjA5MDI4NDU2NX0.oQxkb6DGFBkmHH3w0SBkrDvGWw6nUOgN8sZt3M0FOgA";

const WORKOUTS = [
  { id: 1, title: 'Тренировка 01', src: 'https://kinescope.io/embed/uubwddwtUe1wCwxekvoSnC' },
  { id: 2, title: 'Тренировка 02', src: 'https://kinescope.io/embed/cq2ZJsDy3BjbVof5D7e9ed' },
  { id: 3, title: 'Тренировка 03', src: 'https://kinescope.io/embed/cUxsLJSK59kpWtSng1wzan' },
  { id: 4, title: 'Тренировка 04', src: 'https://kinescope.io/embed/u4KnVkzHZc49oivkheCykH' },
  { id: 5, title: 'Тренировка 05', src: 'https://kinescope.io/embed/bcBj2rwfkZC1BVd6oc38iJ' },
  { id: 6, title: 'Тренировка 06', src: 'https://kinescope.io/embed/sNTgn76CJy7vPGUPRtHBMd' },
];

const TECHNIQUES = [
  { title: 'Вакуум лежа', src: 'https://kinescope.io/embed/s6tnMs2xYgdKvmKvj9eYwK' },
  { title: 'Вакуум стоя', src: 'https://kinescope.io/embed/hQXtm2jofHrn3tGL75ZDiS' },
  { title: 'Вакуум от Ирены', src: 'https://kinescope.io/embed/626uqHGNsTRZZ2Kjhg16NB' },
  { title: 'Вакуум наули', src: 'https://kinescope.io/embed/dMmtLz78sh99xuysfjnVMk' },
  { title: 'Наули от Ирены', src: 'https://kinescope.io/embed/pAbqfz3wd1YPqGpLBwuNC7' },
  { title: 'Если не получается', src: 'https://kinescope.io/embed/mPFbZkifPcWVWYvqt3UCw9' },
];

let currentTab = 'workouts';

async function supabaseFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      ...(options.headers || {}),
    },
  });
  return res.json().catch(() => null);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['workouts','techniques'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

async function init() {
  // Загружаем расписание открытия тренировок
  const schedule = await supabaseFetch('/rest/v1/workout_schedule?select=workout_id,unlocked_at');
  const unlockedIds = new Set((schedule || []).filter(r => r.unlocked_at).map(r => r.workout_id));

  // Рендерим тренировки
  const wList = document.getElementById('workoutList');
  WORKOUTS.forEach((v, idx) => {
    const unlocked = unlockedIds.has(v.id);
    const div = document.createElement('div');
    div.className = 'workout-item' + (unlocked ? '' : ' locked');
    div.innerHTML = `
      <div class="workout-num">${String(idx + 1).padStart(2, '0')}</div>
      <div class="workout-info">
        <div class="workout-name">${v.title}</div>
        ${!unlocked ? '<div class="unlock-soon">Скоро откроется</div>' : ''}
      </div>
      <div class="workout-play">${unlocked ? '▶' : '🔒'}</div>
    `;
    if (unlocked) div.onclick = () => openVideo(v.src, v.title);
    wList.appendChild(div);
  });

  // Рендерим техники — все доступны сразу
  const tList = document.getElementById('techniqueList');
  TECHNIQUES.forEach((v, idx) => {
    const div = document.createElement('div');
    div.className = 'workout-item';
    div.innerHTML = `
      <div class="workout-num">${String(idx + 1).padStart(2, '0')}</div>
      <div class="workout-info">
        <div class="workout-name">${v.title}</div>
      </div>
      <div class="workout-play">▶</div>
    `;
    div.onclick = () => openVideo(v.src, v.title);
    tList.appendChild(div);
  });

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('listScreen').classList.add('active');
}

function openVideo(src, title) {
  document.getElementById('videoFrame').src = src;
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('listScreen').classList.remove('active');
  document.getElementById('playerScreen').classList.add('active');
  window.scrollTo(0, 0);
}

function closeVideo() {
  document.getElementById('videoFrame').src = '';
  document.getElementById('playerScreen').classList.remove('active');
  document.getElementById('listScreen').classList.add('active');
}

irenaCheckAccess().then(ok => {
  if (!ok) return;
  init().catch(() => {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('listScreen').classList.add('active');
  });
});
</script>
</body>
</html>
